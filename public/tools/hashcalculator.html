<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hash计算 - 在线工具集</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/tool.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <main class="tool-layout">
    <div class="container">
      <div class="breadcrumb">
        <a href="../index.html" data-i18n="common.breadcrumbHome">首页</a>
        <span>/</span>
        <a href="../index.html#dev" data-i18n="categories.dev">开发运维</a>
        <span>/</span>
        <span data-i18n="tools.hashcalculator.name">Hash计算</span>
      </div>

      <div class="tool-info-card">
        <div class="info-row">
          <div class="info-icon">#️⃣</div>
          <div class="info-content">
            <h2 data-i18n="tools.hashcalculator.name">Hash计算器</h2>
            <p data-i18n="tools.hashcalculator.desc">多种Hash算法计算工具，支持MD5、SHA-1、SHA-256、SHA-512、RIPEMD-160等算法</p>
          </div>
        </div>
      </div>

      <div class="tool-content">
        <div class="tabs">
          <button class="tab-btn active" data-tab="textHash" onclick="switchTab(this)" data-i18n="tools.hashcalculator.textHash">文本Hash</button>
          <button class="tab-btn" data-tab="fileHash" onclick="switchTab(this)" data-i18n="tools.hashcalculator.fileHash">文件Hash</button>
        </div>

        <div class="tab-content active" id="textHash">
          <div class="form-group">
            <label data-i18n="tools.hashcalculator.inputText">输入文本</label>
            <textarea id="hashInput" class="form-control" rows="4" placeholder="请输入需要计算Hash的文本..."></textarea>
          </div>

          <div class="action-buttons">
            <button class="btn btn-primary" onclick="calculateTextHash()" data-i18n="tools.hashcalculator.calculate">🔐 计算所有Hash</button>
            <button class="btn btn-secondary" onclick="clearHashInput()" data-i18n="common.clear">🗑️ 清空</button>
          </div>

          <div id="textHashResults" style="margin-top:24px;display:flex;flex-direction:column;gap:12px;"></div>
        </div>

        <div class="tab-content" id="fileHash">
          <div class="form-group">
            <label data-i18n="tools.hashcalculator.selectFile">选择文件</label>
            <input type="file" id="hashFileInput" accept="*/*" onchange="calculateFileHash(event)" style="width:100%;padding:10px;border:1px solid var(--border-color);border-radius:8px;background:white;">
          </div>
          <div id="fileHashProgress" style="display:none;margin-top:16px;">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
              <span style="font-size:14px;color:var(--text-secondary);" data-i18n="tools.hashcalculator.calculating">正在计算...</span>
              <span id="hashProgressText" style="font-size:14px;font-weight:600;color:var(--primary-color);"></span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" id="hashProgressBar" style="width:0%"></div>
            </div>
          </div>
          <div id="fileHashResults" style="margin-top:24px;display:flex;flex-direction:column;gap:12px;"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer" id="footer"></footer>

  <script src="../js/common.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/tools/hashcalculator.js"></script>
</body>
</html>
