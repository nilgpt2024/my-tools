              <option value="&#x">&#xHHHH; 格式</option>

            <div class="io-panel-header">

                <button onclick="copyUnicodeOutput()" data-i18n="common.copy">复制</button>
                <button onclick="swapUnicodeContent()" data-i18n="tools.unicode.swap">交换</button>
              </div>
            </div>
            <div class="io-panel-body">
              <textarea id="unicodeOutput" placeholder="转换结果将显示在这里..." readonly></textarea>
            </div>
          </div>
        </div>

        <div class="action-buttons">
          <button class="btn btn-primary" onclick="toUnicode()" data-i18n="tools.unicode.toUnicode">中文 → Unicode</button>
