<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unicode转换 - 在线工具集</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/tool.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <main class="tool-layout">
    <div class="container">
      <div class="breadcrumb">
        <a href="../index.html" data-i18n="common.breadcrumbHome">首页</a>
        <span>/</span>
        <a href="../index.html#dev" data-i18n="categories.dev">开发运维</a>
        <span>/</span>
        <span data-i18n="tools.unicode.name">Unicode转换</span>
      </div>

      <div class="tool-info-card">
        <div class="info-row">
          <div class="info-icon">🌐</div>
          <div class="info-content">
            <h2 data-i18n="tools.unicode.name">Unicode转换</h2>
            <p data-i18n="tools.unicode.desc">中文与Unicode编码相互转换，支持多种Unicode格式</p>
          </div>
        </div>
      </div>

      <div class="tool-content">
        <div class="options-group">
          <div class="option-item">
            <label data-i18n="tools.unicode.format">Unicode格式：</label>
            <select id="unicodeFormat">
              <option value="\\u">\uXXXX 格式</option>
              <option value="&#x">&#xHHHH; 格式</option>
              <option value="&#">&#DDDDD; 格式</option>
              <option value="U+">U+XXXX 格式</option>
            </select>
          </div>
        </div>

        <div class="io-container">
          <div class="io-panel">
            <div class="io-panel-header">
              <h3 data-i18n="common.input">📥 输入内容</h3>
              <div class="io-actions">
                <button onclick="clearUnicodeInput()" data-i18n="common.clear">清空</button>
                <button onclick="pasteUnicodeInput()" data-i18n="common.paste">粘贴</button>
              </div>
            </div>
            <div class="io-panel-body">
              <textarea id="unicodeInput" placeholder="输入中文或Unicode编码..."></textarea>
            </div>
          </div>

          <div class="io-panel">
            <div class="io-panel-header">
              <h3 data-i18n="common.output">📤 转换结果</h3>
              <div class="io-actions">
                <button onclick="copyUnicodeOutput()" data-i18n="common.copy">复制</button>
                <button onclick="swapUnicodeContent()" data-i18n="tools.unicode.swap">交换</button>
              </div>
            </div>
            <div class="io-panel-body">
              <textarea id="unicodeOutput" placeholder="转换结果将显示在这里..." readonly></textarea>
            </div>
          </div>
        </div>

        <div class="action-buttons">
          <button class="btn btn-primary" onclick="toUnicode()" data-i18n="tools.unicode.toUnicode">中文 → Unicode</button>
          <button class="btn btn-primary" onclick="fromUnicode()" data-i18n="tools.unicode.fromUnicode">Unicode → 中文</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer" id="footer"></footer>

  <script src="../js/common.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/tools/unicode.js"></script>
</body>
</html>
