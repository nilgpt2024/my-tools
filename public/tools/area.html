<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="在线面积单位转换器 - 支持平方米、平方千米、公顷、亩、平方英尺等面积单位互相转换">
    <title>面积转换 - 在线工具集</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/tool.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="container tool-layout">
        <div class="breadcrumb">
            <a href="../index.html">首页</a><span>/</span>
            <a href="../index.html#unit">单位转换</a><span>/</span>
            <span>面积转换</span>
        </div>

        <div class="tool-info-card">
            <div class="info-row">
                <div class="info-icon">⬜</div>
                <div class="info-content">
                    <h2 data-i18n="tools.area.name">面积单位转换器</h2>
                    <p data-i18n="tools.area.desc">支持平方米、公顷、亩、平方公里、平方英尺、英亩等面积单位互转</p>
                </div>
            </div>
        </div>

        <div class="tool-content">
            <div class="io-container">
                <div class="io-panel">
                    <div class="io-panel-header"><h3>📥 输入</h3></div>
                    <div class="io-panel-body">
                        <select id="fromUnit" class="form-control" style="margin-bottom: 12px;" onchange="convert()">
                            <option value="sqm" selected>平方米 (m²)</option>
                            <option value="sqkm">平方公里 (km²)</option>
                            <option value="hectare">公顷 (ha)</option>
                            <option value="are">公亩 (a)</option>
                            <option value="mu">亩 (mu)</option>
                            <option value="qing">顷 (qīng)</option>
                            <option value="sqft">平方英尺 (ft²)</option>
                            <option value="sqyd">平方码 (yd²)</option>
                            <option value="acre">英亩 (acre)</option>
                            <option value="sqmi">平方英里 (mi²)</option>
                        </select>
                        <input type="number" id="fromValue" class="form-control" data-i18n-placeholder="tools.area.value" placeholder="输入数值" value="1" oninput="convert()" step="any">
                    </div>
                </div>

                <div style="display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--primary-color);">⇄</div>

                <div class="io-panel">
                    <div class="io-panel-header"><h3>📤 输出</h3></div>
                    <div class="io-panel-body">
                        <select id="toUnit" class="form-control" style="margin-bottom: 12px;" onchange="convert()">
                            <option value="sqm">平方米 (m²)</option>
                            <option value="sqkm" selected>平方公里 (km²)</option>
                            <option value="hectare">公顷 (ha)</option>
                            <option value="are">公亩 (a)</option>
                            <option value="mu">亩 (mu)</option>
                            <option value="qing">顷 (qīng)</option>
                            <option value="sqft">平方英尺 (ft²)</option>
                            <option value="sqyd">平方码 (yd²)</option>
                            <option value="acre">英亩 (acre)</option>
                            <option value="sqmi">平方英里 (mi²)</option>
                        </select>
                        <input type="text" id="toValue" class="form-control" readonly style="background: #f0f9ff; font-weight: 600; font-size: 18px;" value="0">
                    </div>
                </div>
            </div>

            <div style="margin-top: 24px;">
                <h3 style="margin-bottom: 16px;">📊 常用面积换算参考</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px;" id="quickRef"></div>
            </div>
        </div>
    </main>

    <footer class="footer" id="footer"></footer>

    <script src="../js/common.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/tools/area.js"></script>
</body>
</html>
