    <style>
        .reaction-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        .test-arena {
            width: 100%;
            max-width: 600px;
            height: 320px;
            border-radius: var(--border-radius-lg);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            transition: background 0.3s ease, transform 0.1s ease;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .test-arena::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            box-shadow: inset 0 0 0 3px rgba(255,255,255,0.2);
            pointer-events: none;
        }

        .test-arena.waiting {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .test-arena.ready {
            background: linear-gradient(135deg, #27ae60, #229954);
            color: white;
            animation: pulseGreen 0.6s ease-in-out infinite alternate;
        }

        @keyframes pulseGreen {
            from { box-shadow: 0 0 30px rgba(39,174,96,0.3); }
            to { box-shadow: 0 0 50px rgba(39,174,96,0.5); }
        }

        .test-arena.early {
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .test-arena.result {
            background: linear-gradient(135deg, rgba(64,158,255,0.08), rgba(118,75,162,0.08));
            border: 2px solid var(--primary-color);
            color: var(--text-primary);
        }

        .arena-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .arena-text {
            text-align: center;
            line-height: 1.5;
        }

        .result-time {
            font-size: 72px;
            font-weight: 900;
            color: var(--primary-color);
            line-height: 1.2;
        }

        .result-unit {
            font-size: 18px;
            color: var(--text-secondary);
        }

        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 600px;
            margin-top: 28px;
        }

        .stat-card {
            background: #fafafa;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            padding: 16px;
            text-align: center;
        }

        .stat-card-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .stat-card-value {
            font-size: 26px;
            font-weight: 800;
            color: var(--primary-color);
        }

        .history-table {
            width: 100%;
            max-width: 600px;
            margin-top: 24px;
            overflow-x: auto;
        }

        .history-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-list {
            background: #fafafa;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            max-height: 200px;
            overflow-y: auto;
        }

        .history-row {
            display: grid;
            grid-template-columns: 60px 1fr 80px;
            gap: 12px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            align-items: center;
        }

        .history-row:last-child { border-bottom: none; }
        .history-row.header { font-weight: 600; color: var(--text-secondary); background: white; position: sticky; top: 0; z-index: 1; }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            font-size: 12px;
            font-weight: 700;
        }

        .rank-badge.gold { background: #ffd700; color: #7a6000; }
        .rank-badge.silver { background: #c0c0c0; color: #555; }
        .rank-badge.bronze { background: #cd7f32; color: white; }
        .rank-badge.normal { background: #eee; color: #999; }

        .time-value { font-weight: 600; font-family: 'Consolas', monospace; color: var(--primary-color); }
        .time-rank { font-size: 13px; color: var(--text-light); }

        .empty-history {
            padding: 32px;
            text-align: center;
            color: var(--text-light);
            font-style: italic;
        }

        @media (max-width: 480px) {
            .test-arena { height: 260px; font-size: 18px; }
            .arena-icon { font-size: 40px; }
            .result-time { font-size: 52px; }
        }
