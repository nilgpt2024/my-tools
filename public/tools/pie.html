<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="container tool-layout">
        <div class="breadcrumb">
            <a href="../index.html" data-i18n="common.breadcrumbHome">首页</a><span>/</span><a href="../index.html#chart" data-i18n="categories.chart">图表工具</a><span>/</span><span data-i18n="tools.pie.name">饼图</span>
        </div>

        <div class="tool-info-card">
            <div class="info-row"><div class="info-icon">🥧</div><div class="info-content"><h2 data-i18n="tools.pie.name">饼图生成器</h2><p data-i18n="tools.pie.desc">基于 ECharts 的在线饼图生成器，支持普通饼图、环形图、南丁格尔玫瑰图等样式</p></div></div>
        </div>

        <div class="tool-content">
            <div class="io-container">
                <div class="io-panel">
                    <div class="io-panel-header"><h3>📝 <span data-i18n="tools.pie.name">数据输入</span></h3></div>
                    <div class="io-panel-body">
                        <label style="font-size: 13px; font-weight: 600; margin-bottom: 8px; display: block;" data-i18n="tools.pie.name">图表标题：</label>
                        <input type="text" id="chartTitle" class="form-control" value="市场份额分布" oninput="updateChart()" style="margin-bottom: 12px;">
                        
                        <label style="font-size: 13px; font-weight: 600; margin-bottom: 8px; display: block;" data-i18n="tools.pie.name">数据（每行一项，格式：名称:数值）：</label>
                        <textarea id="pieData" class="form-control" rows="10" oninput="updateChart()" placeholder="产品A:120&#10;产品B:200&#10;产品C:150&#10;...">直接访问:335
邮件营销:310
联盟广告:234
视频广告:135
搜索引擎:1548</textarea>
                    </div>
                </div>

                <div class="io-panel">
                    <div class="io-panel-header"><h3>🎨 <span data-i18n="tools.bar.options">样式设置</span></h3></div>
                    <div class="io-panel-body">
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px; font-weight: 600; display: block; margin-bottom: 4px;" data-i18n="tools.pie.name">饼图类型：</label>
                            <select id="pieType" class="form-control" onchange="updateChart()">
                                <option value="normal" data-i18n="tools.pie.normal">普通饼图</option>
                                <option value="doughnut" selected data-i18n="tools.pie.donut">环形图</option>
                                <option value="rose" data-i18n="tools.pie.rose">南丁格尔玫瑰图</option>
                            </select>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px; font-weight: 600; display: block; margin-bottom: 4px;" data-i18n="tools.pie.radius">半径大小：</label>
                            <input type="range" id="radiusSize" min="30" max="80" value="60" oninput="updateChart()" style="width: 100%;">
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px;"><input type="checkbox" id="showLabel" checked onchange="updateChart()"> <span data-i18n="tools.pie.labelPosition">显示标签</span></label>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px;"><input type="checkbox" id="showPercent" checked onchange="updateChart()"> <span data-i18n="tools.pie.showPercent">显示百分比</span></label>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px;"><input type="checkbox" id="roseType" onchange="updateChart()"> 半径模式（仅玫瑰图）</label>
                        </div>
                    </div>
                </div>
            </div>

            <div style="margin-top: 24px;">
                <h3 style="margin-bottom: 16px;">🥧 <span data-i18n="tools.pie.generate">图表预览</span></h3>
                <div id="chartContainer" style="width: 100%; height: 450px; background: white; border-radius: var(--border-radius-lg); box-shadow: var(--shadow); padding: 16px;"></div>
            </div>

            <div class="action-buttons" style="justify-content: center; margin-top: 24px;">
                <button class="btn btn-primary" onclick="downloadChart()">💾 <span data-i18n="common.download">下载图片</span></button>
                <button class="btn btn-secondary" onclick="loadSampleData('browser')">🌐 浏览器份额</button>
                <button class="btn btn-secondary" onclick="loadSampleData('os')">💻 操作系统</button>
            </div>
        </div>
    </main>

    <footer class="footer" id="footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
