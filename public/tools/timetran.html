<body>
  <nav class="navbar" id="navbar"></nav>

  <main class="tool-layout">
    <div class="container">
      <div class="breadcrumb">
        <a href="../index.html" data-i18n="common.breadcrumbHome">首页</a>
        <span>/</span>
        <a href="../index.html#dev" data-i18n="categories.dev">开发运维</a>

        <span data-i18n="tools.timetran.name">时间戳转换</span>
      </div>

      <div class="tool-info-card">
        <div class="info-row">
          <div class="info-icon">⏰</div>
          <div class="info-content">
            <h2 data-i18n="tools.timetran.name">时间戳转换</h2>
            <p data-i18n="tools.timetran.desc">时间戳与日期格式互转，支持秒级和毫秒级时间戳，获取当前时间戳</p>
          </div>
        </div>
      </div>

      <div class="tool-content">
        <div class="tabs">
          <button class="tab-btn active" data-tab="timestampToDate" onclick="switchTab(this)" data-i18n="tools.timetran.timestampToDate">时间戳 → 日期</button>
          <button class="tab-btn" data-tab="dateToTimestamp" onclick="switchTab(this)" data-i18n="tools.timetran.dateToTimestamp">日期 → 时间戳</button>
        </div>

        <div class="tab-content active" id="timestampToDate">
          <div class="options-group">
            <div class="option-item">
              <label><input type="radio" name="tsUnit" value="s" checked> <span data-i18n="tools.timetran.secondTimestamp">秒级时间戳</span></label>
            </div>
            <div class="option-item">
              <label><input type="radio" name="tsUnit" value="ms"> <span data-i18n="tools.timetran.millisecondTimestamp">毫秒级时间戳</span></label>
            </div>
          </div>
          <div class="form-group">
            <label data-i18n="tools.timetran.inputTimestamp">输入时间戳</label>
            <input type="text" class="form-control" id="timestampInput" placeholder="例如：1717046400 或 1717046400000">
          </div>
          <div class="action-buttons">
            <button class="btn btn-primary" onclick="convertToDate()" data-i18n="tools.timetran.convertToDate">🔄 转换为日期</button>
            <button class="btn btn-secondary" onclick="useCurrentTimestamp()" data-i18n="tools.timetran.now">🕐 使用当前时间戳</button>
          </div>
          <div class="output-section">
            <h3 data-i18n="tools.timetran.convertResult">转换结果</h3>
            <div class="result-display" id="dateResult">
              <div class="result-empty" data-i18n="tools.timetran.inputTimestampHint">输入时间戳进行转换</div>
            </div>
          </div>
        </div>

        <div class="tab-content" id="dateToTimestamp">
          <div class="form-group">
            <label data-i18n="tools.timetran.selectDatetime">选择日期时间</label>
            <input type="datetime-local" class="form-control" id="datetimeInput">
          </div>
          <div class="action-buttons">
            <button class="btn btn-primary" onclick="convertToTimestamp()" data-i18n="tools.timetran.convertToTimestamp">🔄 转换为时间戳</button>
            <button class="btn btn-secondary" onclick="useCurrentDate()" data-i18n="tools.timetran.now">🕐 使用当前时间</button>
          </div>
          <div class="output-section">
            <h3 data-i18n="tools.timetran.convertResult">转换结果</h3>
            <div class="result-display" id="timestampResult">
              <div class="result-empty" data-i18n="tools.timetran.selectDatetimeHint">选择日期时间进行转换</div>
            </div>
          </div>
