<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="container tool-layout">
        <div class="breadcrumb">
            <a href="../index.html" data-i18n="common.breadcrumbHome">首页</a><span>/</span><a href="../index.html#chart" data-i18n="categories.chart">图表工具</a><span>/</span><span data-i18n="tools.wordcloud.name">词云图</span>
        </div>

        <div class="tool-info-card">
            <div class="info-row"><div class="info-icon">☁️</div><div class="info-content"><h2 data-i18n="tools.wordcloud.name">词云图生成器</h2><p data-i18n="tools.wordcloud.desc">基于 ECharts-WordCloud 的在线词云图生成器，支持自定义文本权重、颜色方案、形状样式等</p></div></div>
        </div>

        <div class="tool-content">
            <div class="io-container">
                <div class="io-panel">
                    <div class="io-panel-header"><h3>📝 <span data-i18n="tools.wordcloud.inputWords">文本数据</span></h3></div>
                    <div class="io-panel-body">
                        <label style="font-size: 13px; font-weight: 600; margin-bottom: 8px; display: block;">输入方式：</label>
                        <select id="inputMode" class="form-control" style="margin-bottom: 12px;" onchange="toggleInputMode()">
                            <option value="text">自由文本（自动分词）</option>
                            <option value="weighted" selected>带权重的词语（格式：词语:权重）</option>
                            <option value="json">JSON 格式</option>
                        </select>

                        <label style="font-size: 13px; font-weight: 600; margin-bottom: 8px; display: block;" id="dataLabel" data-i18n="tools.wordcloud.inputWords">输入文本或粘贴内容：</label>
                        <textarea id="wordData" class="form-control" rows="12" oninput="updateWordCloud()" placeholder="在此输入文本，系统会自动统计词频并生成词云...">JavaScript:100
Python:95
Java:88
TypeScript:75
Go:65
Rust:55
C++:80
PHP:60
Swift:45
Kotlin:50
Dart:40
Ruby:35
Vue.js:70
React:72
Angular:58
Node.js:68
Docker:52
Kubernetes:48
AWS:56
AI:90
机器学习:85
深度学习:78
前端开发:82
后端开发:76
云计算:62
大数据:59
区块链:42
物联网:38</textarea>
                        
                        <button class="btn btn-secondary" style="margin-top: 12px; width: 100%;" onclick="loadSampleText()">📝 加载示例文本</button>
                    </div>
                </div>

                <div class="io-panel">
                    <div class="io-panel-header"><h3>🎨 <span data-i18n="tools.bar.options">样式设置</span></h3></div>
                    <div class="io-panel-body">
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px; font-weight: 600; display: block; margin-bottom: 4px;" data-i18n="tools.wordcloud.shape">形状：</label>
                            <select id="shape" class="form-control" onchange="updateWordCloud()">
                                <option value="circle" data-i18n="tools.wordcloud.circle">圆形</option>
                                <option value="cardioid" data-i18n="tools.wordcloud.cardioid">心形</option>
                                <option value="diamond" data-i18n="tools.wordcloud.diamond">菱形</option>
                                <option value="triangle-forward" data-i18n="tools.wordcloud.triangle">三角形</option>
                                <option value="pentagon" data-i18n="tools.wordcloud.pentagon">五边形</option>
                                <option value="star" data-i18n="tools.wordcloud.star">星形</option>
                            </select>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px; font-weight: 600; display: block; margin-bottom: 4px;" data-i18n="tools.wordcloud.colorScheme">颜色方案：</label>
                            <select id="colorScheme" class="form-control" onchange="updateWordCloud()">
                                <option value="random">随机彩色</option>
                                <option value="blue">蓝色系</option>
                                <option value="warm">暖色系</option>
                                <option value="cool">冷色系</option>
                                <option value="gradient">渐变色</option>
                                <option value="nature">自然色</option>
                            </select>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px; font-weight: 600; display: block; margin-bottom: 4px;" data-i18n="tools.wordcloud.fontFamily">字体大小范围：</label>
                            <div style="display: flex; gap: 8px; align-items: center;">
                                <input type="number" id="minSize" value="12" min="8" max="30" class="form-control" style="width: 80px;" oninput="updateWordCloud()">
                                <span>-</span>
                                <input type="number" id="maxSize" value="60" min="30" max="120" class="form-control" style="width: 80px;" oninput="updateWordCloud()">
                            </div>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px;"><input type="checkbox" id="rotateText" checked onchange="updateWordCloud()"> <span data-i18n="tools.wordcloud.rotation">文字旋转</span></label>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px;"><input type="checkbox" id="drawOutOfBound" onchange="updateWordCloud()"> 允许超出边界</label>
                        </div>
                    </div>
                </div>
            </div>

            <div style="margin-top: 24px;">
                <h3 style="margin-bottom: 16px;">☁️ <span data-i18n="tools.wordcloud.generate">词云预览</span></h3>
                <div id="chartContainer" style="width: 100%; height: 500px; background: white; border-radius: var(--border-radius-lg); box-shadow: var(--shadow);"></div>
            </div>

            <div class="action-buttons" style="justify-content: center; margin-top: 24px;">
                <button class="btn btn-primary" onclick="downloadWordCloud()">💾 <span data-i18n="common.download">下载图片</span></button>
                <button class="btn btn-secondary" onclick="shuffleColors()">🎨 <span data-i18n="tools.wordcloud.shuffle">随机换色</span></button>
                <button class="btn btn-secondary" onclick="loadPreset('tech')">💻 技术热词</button>
                <button class="btn btn-secondary" onclick="loadPreset('emotion')">😊 情感词汇</button>
            </div>
