<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="container tool-layout">
        <div class="breadcrumb">
            <a href="../index.html" data-i18n="common.breadcrumbHome">首页</a><span>/</span><a href="../index.html#chart" data-i18n="categories.chart">图表工具</a><span>/</span><span data-i18n="tools.line.name">折线图</span>
        </div>

        <div class="tool-info-card">
            <div class="info-row"><div class="info-icon">📈</div><div class="info-content"><h1 data-i18n="tools.line.name">折线图生成器</h1><p data-i18n="tools.line.desc">基于 ECharts 的在线折线图生成器，支持多系列数据、平滑曲线、面积填充等高级功能</p></div></div>
        </div>

        <div class="tool-content">
            <div class="io-container">
                <div class="io-panel">
                    <div class="io-panel-header"><h3>📝 <span data-i18n="tools.line.multiSeries">数据输入</span></h3></div>
                    <div class="io-panel-body">
                        <label style="font-size: 13px; font-weight: 600; margin-bottom: 8px; display: block;" data-i18n="tools.line.name">图表标题：</label>
                        <input type="text" id="chartTitle" class="form-control" value="趋势分析" oninput="updateChart()" style="margin-bottom: 12px;">
                        
                        <label style="font-size: 13px; font-weight: 600; margin-bottom: 8px; display: block;" data-i18n="tools.bar.xAxis">X轴标签（逗号分隔）：</label>
                        <input type="text" id="categories" class="form-control" value="周一,周二,周三,周四,周五,周六,周日" oninput="updateChart()" style="margin-bottom: 12px;">
                        
                        <label style="font-size: 13px; font-weight: 600; margin-bottom: 8px; display: block;" data-i18n="tools.line.multiSeries">系列1 名称 & 数值：</label>
                        <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                            <input type="text" id="name1" class="form-control" value="访问量" placeholder="系列名" oninput="updateChart()" style="flex: 1;">
                            <input type="text" id="values1" class="form-control" value="820,932,901,934,1290,1330,1320" placeholder="数值" oninput="updateChart()" style="flex: 2;">
                        </div>

                        <label style="font-size: 13px; font-weight: 600; margin-bottom: 8px; display: block;" data-i18n="tools.line.multiSeries">系列2 名称 & 数值（可选）：</label>
                        <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                            <input type="text" id="name2" class="form-control" value="转化量" placeholder="系列名" oninput="updateChart()" style="flex: 1;">
                            <input type="text" id="values2" class="form-control" value="620,732,701,734,1090,1030,1020" placeholder="数值" oninput="updateChart()" style="flex: 2;">
                        </div>
                    </div>
                </div>

                <div class="io-panel">
                    <div class="io-panel-header"><h3>🎨 <span data-i18n="tools.bar.options">样式设置</span></h3></div>
                    <div class="io-panel-body">
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px; font-weight: 600; display: block; margin-bottom: 4px;" data-i18n="tools.line.smooth">曲线模式：</label>
                            <select id="lineStyle" class="form-control" onchange="updateChart()">
                                <option value="smooth" data-i18n="tools.line.smooth">平滑曲线</option>
                                <option value="straight">折线</option>
                                <option value="step" data-i18n="tools.line.step">阶梯线</option>
                            </select>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px; font-weight: 600; display: block; margin-bottom: 4px;">颜色方案：</label>
                            <select id="colorScheme" class="form-control" onchange="updateChart()">
                                <option value="blue">蓝色系</option>
                                <option value="colorful">彩色系</option>
                                <option value="warm">暖色系</option>
                                <option value="cool">冷色系</option>
                            </select>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px;"><input type="checkbox" id="showArea" checked onchange="updateChart()"> <span data-i18n="tools.line.areaFill">面积填充</span></label>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px;"><input type="checkbox" id="showPoint" checked onchange="updateChart()"> <span data-i18n="tools.line.dataPoint">显示数据点</span></label>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px;"><input type="checkbox" id="showSymbol" checked onchange="updateChart()"> 显示标记符号</label>
                        </div>
                    </div>
                </div>
            </div>

            <div style="margin-top: 24px;">
                <h3 style="margin-bottom: 16px;">📈 <span data-i18n="tools.line.generate">图表预览</span></h3>
                <div id="chartContainer" style="width: 100%; height: 450px; background: white; border-radius: var(--border-radius-lg); box-shadow: var(--shadow); padding: 16px;"></div>
            </div>

            <div class="action-buttons" style="justify-content: center; margin-top: 24px;">
                <button class="btn btn-primary" onclick="downloadChart()">💾 <span data-i18n="common.download">下载图片</span></button>
                <button class="btn btn-secondary" onclick="loadSampleData('stock')">📈 股票趋势</button>
                <button class="btn btn-secondary" onclick="loadSampleData('weather')">🌡️ 温度变化</button>
            </div>
        </div>
    </main>
