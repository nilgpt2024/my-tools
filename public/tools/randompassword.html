<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随机密码生成器 - 在线工具集</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/tool.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <main class="tool-layout">
    <div class="container">
      <div class="breadcrumb">
        <a href="../index.html" data-i18n="common.breadcrumbHome">首页</a>
        <span>/</span>
        <a href="../index.html#dev" data-i18n="categories.dev">开发运维</a>
        <span>/</span>
        <span data-i18n="tools.randompassword.name">随机密码生成器</span>
      </div>

      <div class="tool-info-card">
        <div class="info-row">
          <div class="info-icon">🔑</div>
          <div class="info-content">
            <h2 data-i18n="tools.randompassword.name">随机密码生成器</h2>
            <p data-i18n="tools.randompassword.desc">生成安全的随机密码，支持自定义长度、字符类型，可一键复制或批量生成</p>
          </div>
        </div>
      </div>

      <div class="tool-content">
        <div class="options-group">
          <div class="option-item">
            <label data-i18n="tools.randompassword.lengthLabel">密码长度：</label>
            <input type="number" id="pwdLength" value="16" min="4" max="128">
          </div>
          <div class="option-item">
            <label><input type="checkbox" id="includeUpper" checked> <span data-i18n="tools.randompassword.includeUppercase">大写字母 (A-Z)</span></label>
          </div>
          <div class="option-item">
            <label><input type="checkbox" id="includeLower" checked> <span data-i18n="tools.randompassword.includeLowercase">小写字母 (a-z)</span></label>
          </div>
          <div class="option-item">
            <label><input type="checkbox" id="includeNumbers" checked> <span data-i18n="tools.randompassword.includeNumbers">数字 (0-9)</span></label>
          </div>
          <div class="option-item">
            <label><input type="checkbox" id="includeSymbols" checked> <span data-i18n="tools.randompassword.includeSymbols">特殊符号 (!@#$...)</span></label>
          </div>
          <div class="option-item">
            <label data-i18n="tools.randompassword.countLabel">生成数量：</label>
            <input type="number" id="generateCount" value="1" min="1" max="50">
          </div>
        </div>

        <div class="action-buttons">
          <button class="btn btn-primary" onclick="generatePassword()" data-i18n="tools.randompassword.generate">🔄 生成密码</button>
          <button class="btn btn-secondary" onclick="copyAllPasswords()" data-i18n="common.copy">📋 复制全部</button>
          <button class="btn btn-secondary" onclick="clearResult()" data-i18n="common.clear">🗑️ 清空结果</button>
        </div>

        <div class="output-section">
          <h3 data-i18n="tools.randompassword.resultTitle">生成结果</h3>
          <div class="result-display" id="resultDisplay">
            <div class="result-empty" data-i18n="tools.randompassword.clickToGenerate">点击上方按钮生成密码</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer" id="footer"></footer>

  <script src="../js/common.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/tools/randompassword.js"></script>
</body>
</html>
