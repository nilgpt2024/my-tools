              <div class="io-actions">
                <button onclick="copyJsOutput()" data-i18n="common.copy">复制</button>
                <button onclick="downloadJs()" data-i18n="common.download">下载</button>
              </div>
            </div>
            <div class="io-panel-body">
              <textarea id="jsOutput" placeholder="输出结果将显示在这里..." readonly></textarea>
            </div>
          </div>
        </div>

        <div class="action-buttons">
          <button class="btn btn-primary" onclick="formatJsCode()" data-i18n="tools.jsformat.format">✨ 格式化</button>
          <button class="btn btn-primary" onclick="compressJsCode()" data-i18n="tools.jsformat.compress">📦 压缩</button>
