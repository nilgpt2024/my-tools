    <style>
        .random-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        .input-area {
            width: 100%;
            max-width: 600px;
            margin-bottom: 24px;
        }

        .input-area textarea {
            width: 100%;
            min-height: 140px;
            padding: 16px;
            font-size: 15px;
            line-height: 1.8;
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            background: #fafafa;
            color: var(--text-primary);
            resize: vertical;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .input-area textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(64,158,255,0.12);
            background: white;
        }

        .input-hint {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 8px;
        }

        .options-row {
            display: flex;
            gap: 16px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .option-field {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #fafafa;
            padding: 8px 14px;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
        }

        .option-field label {
            font-size: 14px;
            white-space: nowrap;
            font-weight: 500;
        }

        .option-field input[type="number"] {
            width: 60px;
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-align: center;
            font-size: 15px;
            outline: none;
        }

        .option-field input[type="number"]:focus {
            border-color: var(--primary-color);
        }

        .result-display-area {
            width: 100%;
            max-width: 600px;
            margin-bottom: 24px;
        }

        .slot-machine {
            height: 100px;
            border: 3px solid var(--primary-color);
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            position: relative;
            background: linear-gradient(180deg, rgba(64,158,255,0.05), rgba(118,75,162,0.05));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slot-text {
            font-size: 36px;
            font-weight: 800;
            color: var(--primary-color);
            text-align: center;
            padding: 0 20px;
            word-break: break-all;
            transition: opacity 0.2s;
        }

        .slot-text.rolling {
            animation: slotRoll 0.08s linear infinite;
        }

        @keyframes slotRoll {
            0% { transform: translateY(-4px); opacity: 0.5; }
            50% { transform: translateY(4px); opacity: 1; }
            100% { transform: translateY(-4px); opacity: 0.5; }
        }

        .slot-text.selected {
            animation: selectedPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--accent-color);
        }

        @keyframes selectedPop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }

        .action-buttons {
            display: flex;
            gap: 16px;
            margin-bottom: 28px;
        }

        .pick-btn {
            padding: 14px 48px;
            font-size: 18px;
            border-radius: 50px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(245,87,108,0.35);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .pick-btn:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.04);
            box-shadow: 0 8px 28px rgba(245,87,108,0.45);
        }

        .pick-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .history-panel {
            width: 100%;
            max-width: 600px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .history-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .clear-history-btn {
            padding: 4px 14px;
            font-size: 12px;
        }

        .history-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 16px;
            background: #fafafa;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            min-height: 52px;
        }

        .history-tag {
            display: inline-flex;
            align-items: center;
            padding: 6px 16px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            animation: tagPopIn 0.3s ease;
        }

        @keyframes tagPopIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .empty-tip {
            color: var(--text-light);
            font-style: italic;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .slot-text { font-size: 24px; }
            .pick-btn { padding: 12px 32px; font-size: 16px; }
        }
