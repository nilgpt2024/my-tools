      </div>

      <div class="tool-content">
        <div class="options-group">
          <div class="option-item">
            <label data-i18n="tools.htmlformat.indentSize">缩进大小：</label>
            <select id="htmlIndentSize">
              <option value="2" selected>2 空格</option>
              <option value="4">4 空格</option>
            </select>
          </div>
        </div>

        <div class="io-container">
          <div class="io-panel">
            <div class="io-panel-header">
              <h3 data-i18n="tools.htmlformat.inputHtml">📥 HTML代码输入</h3>
              <div class="io-actions">
                <button onclick="clearHtmlInput()" data-i18n="common.clear">清空</button>
                <button onclick="pasteHtmlInput()" data-i18n="common.paste">粘贴</button>
                <button onclick="loadHtmlSample()" data-i18n="tools.htmlformat.sample">示例</button>
              </div>
            </div>
            <div class="io-panel-body">
              <textarea id="htmlInput" placeholder="请输入HTML代码..."></textarea>
            </div>
          </div>

          <div class="io-panel">
            <div class="io-panel-header">
              <h3 data-i18n="tools.htmlformat.formatted">📤 格式化结果</h3>
              <div class="io-actions">
                <button onclick="copyHtmlOutput()" data-i18n="common.copy">复制</button>
                <button onclick="downloadHtml()" data-i18n="common.download">下载</button>
              </div>
            </div>
            <div class="io-panel-body">
              <textarea id="htmlOutput" placeholder="格式化结果将显示在这里..." readonly></textarea>
            </div>
          </div>
        </div>

        <div class="action-buttons">
          <button class="btn btn-primary" onclick="formatHtmlCode()" data-i18n="tools.htmlformat.format">✨ 格式化</button>
          <button class="btn btn-secondary" onclick="compressHtmlCode()" data-i18n="tools.htmlformat.compress">📦 压缩（去除空白）</button>
