<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="在线数字转中文大写工具 - 将阿拉伯数字转换为中文大写金额/数字，支持人民币金额格式">
    <meta name="keywords" content="数字转中文,阿拉伯数字,中文大写,人民币大写,金额转换,数字转换">
    <title>数字转中文 - 在线工具集</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/tool.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="container tool-layout">
        <div class="breadcrumb">
            <a href="../index.html">首页</a>
            <span>/</span>
            <a href="../index.html#text">文本处理</a>
            <span>/</span>
            <span>数字转中文</span>
        </div>

        <div class="tool-info-card">
            <div class="info-row">
                <div class="info-icon">🔢</div>
                <div class="info-content">
                    <h2 data-i18n="tools.numbertochinese.name">数字转中文大写</h2>
                    <p data-i18n="tools.numbertochinese.desc">将阿拉伯数字转换为中文大写，支持普通数字和人民币金额格式，适用于财务、合同等正式场合</p>
                </div>
            </div>
        </div>

        <div class="tool-content">
            <div class="nc-input-section">
                <div class="form-group">
                    <label data-i18n="tools.numbertochinese.number">输入数字</label>
                    <input type="text" id="numberInput" class="form-control"
                           placeholder="请输入数字，例如：12345 或 12345.67"
                           value="123456789.12"
                           style="font-size:20px;letter-spacing:2px;text-align:center;">
                </div>

                <div style="display:flex;gap:10px;justify-content:center;margin-top:16px;">
                    <button class="btn btn-secondary" onclick="setExample(0)">示例1: 整数</button>
                    <button class="btn btn-secondary" onclick="setExample(1)">示例2: 小数</button>
                    <button class="btn btn-secondary" onclick="setExample(2)">示例3: 大额</button>
                    <button class="btn btn-secondary" onclick="setExample(3)">示例4: 零值</button>
                </div>
            </div>

            <div class="options-group">
                <div class="option-item">
                    <label data-i18n="tools.numbertochinese.type">转换模式：</label>
                    <select id="convertMode" onchange="doConvert()">
                        <option value="rmb" data-i18n="tools.numbertochinese.rmb">人民币金额（壹贰叁...）</option>
                        <option value="uppercase" data-i18n="tools.numbertochinese.capital">中文大写（壹贰叁...）</option>
                        <option value="normal" data-i18n="tools.numbertochinese.lowercase">中文小写（一二三...）</option>
                        <option value="capital" data-i18n="tools.numbertochinese.accounting">会计大写（零壹贰...）</option>
                    </select>
                </div>
                <div class="option-item">
                    <label><input type="checkbox" id="autoConvert" checked> 实时转换</label>
                </div>
            </div>

            <div class="nc-result-section">
                <h3 style="font-size:15px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;">
                    <span>📋 转换结果</span>
                    <div style="display:flex;gap:8px;">
                        <button class="btn btn-secondary" style="padding:6px 14px;font-size:12px;" onclick="copyResult()">📋 复制</button>
                    </div>
                </h3>

                <div class="result-cards">
                    <div class="result-card-main" id="mainResult">
                        <div class="result-label">转换结果</div>
                        <div class="result-value" id="resultValue">壹亿贰仟叁佰肆拾伍万陆仟柒佰捌拾玖元壹角贰分</div>
                    </div>

                    <div class="result-card-grid">
                        <div class="result-card-mini">
                            <div class="mini-label">原始数值</div>
                            <div class="mini-value" id="originalNum">123,456,789.12</div>
                        </div>
                        <div class="result-card-mini">
                            <div class="mini-label">整数部分</div>
                            <div class="mini-value" id="integerPart">壹亿贰仟叁佰肆拾伍万陆仟柒佰捌拾玖元</div>
                        </div>
                        <div class="result-card-mini">
                            <div class="mini-label">小数部分</div>
                            <div class="mini-value" id="decimalPart">壹角贰分</div>
                        </div>
                        <div class="result-card-mini">
                            <div class="mini-label">字符数</div>
                            <div class="mini-value" id="charCount">18 字符</div>
                        </div>
                    </div>
                </div>
            </div>

            <div style="margin-top:24px;padding:20px;background:linear-gradient(135deg,rgba(64,158,255,0.03),rgba(118,75,162,0.03));border-radius:12px;border:1px solid rgba(64,158,255,0.1);">
                <h4 style="font-size:14px;color:var(--primary-color);margin-bottom:14px;">📖 数字对照表</h4>
                <div class="number-ref-table">
                    <table style="width:100%;border-collapse:collapse;font-size:13px;">
                        <thead>
                            <tr style="background:rgba(64,158,255,0.05);">
                                <th style="padding:8px;border:1px solid var(--border-color);">数字</th>
                                <th style="padding:8px;border:1px solid var(--border-color);">大写（财务）</th>
                                <th style="padding:8px;border:1px solid var(--border-color);">小写</th>
                                <th style="padding:8px;border:1px solid var(--border-color);">单位</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td style="padding:6px;border:1px solid var(--border-color);text-align:center;">0</td><td style="padding:6px;border:1px solid var(--border-color);text-align:center;">零</td><td style="padding:6px;border:1px solid var(--border-color);text-align:center;">〇 / 零</td><td rowspan="5" style="padding:6px;border:1px solid var(--border-color);text-align:center;vertical-align:middle;">基本数字</td></tr>
                            <tr><td style="padding:6px;border:1px solid var(--border-color);text-align:center;">1</td><td style="padding:6px;border:1px solid var(--border-color);text-align:center;">壹</td><td style="padding:6px;border:1px solid var(--border-color);text-align:center;">一</td></tr>
                            <tr><td style="padding:6px;border:1px solid var(--border-color);text-align:center;">2</td><td style="padding:6px;border:1px solid var(--border-color);text-align:center;">贰</td><td style="padding:6px;border:1px solid var(--border-color);text-align:center;">二</td></tr>
                            <tr><td style="padding:6px;border:1px solid var(--border-color);text-align:center;">3</td><td style="padding:6px;border:1px solid var(--border-color);text-align:center;">叁</td><td style="padding:6px;border:1px solid var(--border-color);text-align:center;">三</td></tr>
                            <tr><td style="padding:6px;border:1px solid var(--border-color);text-align:center;">4~9</td><td style="padding:6px;border:1px solid var(--border-color);text-align:center;">肆伍陆柒捌玖</td><td style="padding:6px;border:1px solid var(--border-color);text-align:center;">四五六七八九</td></tr>
                            <tr><td colspan="4" style="padding:8px;border:1px solid var(--border-color);background:#fafafa;"><strong>单位：</strong>拾、佰、仟、万、亿、兆 | <strong>货币：</strong>元（圆）、角、分</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="action-buttons" style="margin-top:24px;">
                <button class="btn btn-primary" onclick="doConvert()">🔄 转换</button>
                <button class="btn btn-danger" onclick="clearAll()">🗑️ 清空</button>
            </div>
        </div>
    </main>

    <footer class="footer" id="footer"></footer>

    <script src="../js/common.js"></script>
    <script src="../js/i18n.js"></script>
    <script src="../js/tools/numbertochinese.js"></script>
</body>
</html>
