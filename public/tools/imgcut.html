<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="container tool-layout">
        <div class="breadcrumb">
            <a href="../index.html" data-i18n="common.breadcrumbHome">首页</a>
            <span>/</span>
            <a href="../index.html#image" data-i18n="categories.image">图像处理</a>
            <span>/</span>
            <span data-i18n="tools.imgcut.name">图片裁剪</span>
        </div>

        <div class="tool-info-card">
            <div class="info-row">
                <div class="info-icon">✂️</div>
                <div class="info-content">
                    <h2 data-i18n="tools.imgcut.name">图片裁剪工具</h2>
                    <p data-i18n="tools.imgcut.desc">在线图片裁剪工具，支持自由裁剪和固定比例裁剪，所有操作在浏览器本地完成，保护您的隐私安全</p>
                </div>
            </div>
        </div>

        <div class="tool-content">
            <div class="input-section">
                <h3>📁 <span data-i18n="tools.imgcut.uploadImage">选择图片</span></h3>
                <div style="border: 2px dashed var(--border-color); border-radius: var(--border-radius); padding: 40px; text-align: center; background: #fafafa; cursor: pointer; transition: all 0.3s;" id="dropZone" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                    <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
                    <div style="font-size: 48px; margin-bottom: 16px;">📷</div>
                    <p style="color: var(--text-secondary); margin-bottom: 12px;" data-i18n="tools.imgcut.orDragDrop">点击选择图片或拖拽图片到此处</p>
                    <p style="color: var(--text-light); font-size: 13px;">支持 JPG、PNG、GIF、WebP 格式</p>
                </div>
            </div>

            <div id="editorSection" style="display: none;">
                <div class="options-group">
                    <div class="option-item">
                        <label data-i18n="tools.imgcut.aspectRatio">裁剪模式：</label>
                        <select id="cropMode" onchange="changeCropMode()">
                            <option value="free" data-i18n="tools.imgcut.free">自由裁剪</option>
                            <option value="1:1" data-i18n="tools.imgcut.square">1:1 正方形</option>
                            <option value="4:3" data-i18n="tools.imgcut.ratio43">4:3 横向</option>
                            <option value="3:4">3:4 纵向</option>
                            <option value="16:9" data-i18n="tools.imgcut.ratio169">16:9 宽屏</option>
                            <option value="9:16">9:16 竖屏</option>
                        </select>
                    </div>
                    <div class="option-item">
                        <label data-i18n="tools.imgcut.format">输出格式：</label>
                        <select id="outputFormat">
                            <option value="png">PNG</option>
                            <option value="jpeg">JPEG</option>
                            <option value="webp">WebP</option>
                        </select>
                    </div>
                    <div class="option-item" id="qualityGroup" style="display: none;">
                        <label data-i18n="tools.imgcut.quality">质量：</label>
                        <input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.9" style="width: 120px;">
                        <span id="qualityValue">90%</span>
                    </div>
                </div>

                <div style="position: relative; display: inline-block; max-width: 100%; margin-bottom: 20px;">
                    <canvas id="canvas" style="max-width: 100%; border: 1px solid var(--border-color); border-radius: var(--border-radius); cursor: crosshair;"></canvas>
                    <div id="cropBox" style="position: absolute; border: 2px solid var(--primary-color); background: rgba(64, 158, 255, 0.15); display: none; pointer-events: none;">
                        <div style="position: absolute; width: 8px; height: 8px; background: var(--primary-color); border-radius: 50%; cursor: nw-resize;" data-handle="nw" style="top: -4px; left: -4px;"></div>
                        <div style="position: absolute; width: 8px; height: 8px; background: var(--primary-color); border-radius: 50%; cursor: ne-resize;" data-handle="ne" style="top: -4px; right: -4px;"></div>
                        <div style="position: absolute; width: 8px; height: 8px; background: var(--primary-color); border-radius: 50%; cursor: sw-resize;" data-handle="sw" style="bottom: -4px; left: -4px;"></div>
                        <div style="position: absolute; width: 8px; height: 8px; background: var(--primary-color); border-radius: 50%; cursor: se-resize;" data-handle="se" style="bottom: -4px; right: -4px;"></div>
                    </div>
                </div>

                <div style="background: #f8f9fa; padding: 12px 16px; border-radius: var(--border-radius); margin-bottom: 20px; font-size: 14px; color: var(--text-secondary);">
                    <strong>裁剪区域：</strong>
                    <span id="cropInfo">未选择</span> | 
                    <strong>图片尺寸：</strong>
                    <span id="imageSizeInfo">-</span>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="cropImage()" data-i18n="tools.imgcut.crop">✂️ 裁剪图片</button>
                    <button class="btn btn-secondary" onclick="resetCrop()" data-i18n="tools.imgcut.reset">🔄 重置</button>
                    <button class="btn btn-secondary" onclick="document.getElementById('imageInput').click()" data-i18n="tools.imgcut.uploadImage">📁 重新选择</button>
                </div>
            </div>

            <div id="resultSection" style="display: none; margin-top: 24px;">
                <h3>📤 裁剪结果</h3>
                <div style="text-align: center; padding: 24px; background: #f8f9fa; border-radius: var(--border-radius);">
                    <img id="resultImage" style="max-width: 100%; max-height: 400px; border-radius: var(--border-radius); box-shadow: var(--shadow);">
                    <div style="margin-top: 16px; font-size: 14px; color: var(--text-secondary);" id="resultInfo"></div>
                    <div class="action-buttons" style="justify-content: center; margin-top: 16px;">
                        <button class="btn btn-primary" onclick="downloadResult()" data-i18n="tools.imgcut.download">💾 下载图片</button>
                        <button class="btn btn-secondary" onclick="backToEdit()">← 返回编辑</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
