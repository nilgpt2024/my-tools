    <style>
        .dice-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .dice-area {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 32px;
        }

        .dice-wrapper {
            perspective: 600px;
        }

        .dice {
            width: 100px;
            height: 100px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .dice.rolling {
            animation: diceRoll 0.8s ease-out forwards;
        }

        @keyframes diceRoll {
            0% { transform: rotateX(0) rotateY(0) rotateZ(0); }
            15% { transform: rotateX(180deg) rotateY(90deg) rotateZ(45deg); }
            30% { transform: rotateX(360deg) rotateY(180deg) rotateZ(90deg); }
            50% { transform: rotateX(540deg) rotateY(270deg) rotateZ(135deg); }
            70% { transform: rotateX(720deg) rotateY(360deg) rotateZ(180deg); }
            85% { transform: rotateX(810deg) rotateY(405deg) rotateZ(200deg); }
            100% { transform: rotateX(var(--rx)) rotateY(var(--ry)) rotateZ(var(--rz)); }
        }

        .dice img {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }

        .result-panel {
            text-align: center;
            margin-bottom: 24px;
            min-height: 80px;
        }

        .result-value {
            font-size: 48px;
            font-weight: 800;
            color: var(--primary-color);
            opacity: 0;
            transform: scale(0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-value.show {
            opacity: 1;
            transform: scale(1);
        }

        .result-total {
            font-size: 18px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 24px;
        }

        .dice-count-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fafafa;
            padding: 8px 16px;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
        }

        .dice-count-selector label {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        .dice-count-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .dice-count-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .dice-count-display {
            font-size: 20px;
            font-weight: 700;
            min-width: 28px;
            text-align: center;
            color: var(--primary-color);
        }

        .roll-btn {
            padding: 14px 40px;
            font-size: 18px;
            border-radius: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(102,126,234,0.4);
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        .roll-btn:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 28px rgba(102,126,234,0.5);
        }

        .roll-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .history-section {
            width: 100%;
            max-width: 500px;
            margin-top: 24px;
        }

        .history-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding: 16px;
            background: #fafafa;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            max-height: 150px;
            overflow-y: auto;
        }

        .history-item {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
            padding: 0 10px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 480px) {
            .dice {
                width: 80px;
                height: 80px;
            }
            .result-value {
                font-size: 36px;
            }
        }
    </style>
