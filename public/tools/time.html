<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="在线时间单位转换器 - 秒、分、时、天、周、月、年等时间单位互相转换">
    <title>时间转换 - 在线工具集</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/tool.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="container tool-layout">
        <div class="breadcrumb">
            <a href="../index.html">首页</a><span>/</span><a href="../index.html#unit">单位转换</a><span>/</span><span>时间转换</span>
        </div>

        <div class="tool-info-card">
            <div class="info-row"><div class="info-icon">⏱️</div><div class="info-content"><h2 data-i18n="tools.time.name">时间单位转换器</h2><p data-i18n="tools.time.desc">支持秒、分、时、天、周、月、季度、年等时间单位互转</p></div></div>
        </div>

        <div class="tool-content">
            <div class="io-container">
                <div class="io-panel">
                    <div class="io-panel-header"><h3>📥 输入</h3></div>
                    <div class="io-panel-body">
                        <select id="fromUnit" class="form-control" style="margin-bottom: 12px;" onchange="convert()">
                            <option value="ms">毫秒 (ms)</option>
                            <option value="s" selected>秒 (s)</option>
                            <option value="min">分钟 (min)</option>
                            <option value="h">小时 (h)</option>
                            <option value="d">天 (d)</option>
                            <option value="w">周 (week)</option>
                            <option value="mo">月 (month,30d)</option>
                            <option value="q">季度 (quarter)</option>
                            <option value="y">年 (year,365d)</option>
                        </select>
                        <input type="number" id="fromValue" class="form-control" placeholder="输入数值" value="1" oninput="convert()" step="any">
                    </div>
                </div>
                <div style="display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--primary-color);">⇄</div>
                <div class="io-panel">
                    <div class="io-panel-header"><h3>📤 输出</h3></div>
                    <div class="io-panel-body">
                        <select id="toUnit" class="form-control" style="margin-bottom: 12px;" onchange="convert()">
                            <option value="ms">毫秒 (ms)</option>
                            <option value="s">秒 (s)</option>
                            <option value="min" selected>分钟 (min)</option>
                            <option value="h">小时 (h)</option>
                            <option value="d">天 (d)</option>
                            <option value="w">周 (week)</option>
                            <option value="mo">月 (month,30d)</option>
                            <option value="q">季度 (quarter)</option>
                            <option value="y">年 (year,365d)</option>
                        </select>
                        <input type="text" id="toValue" class="form-control" readonly style="background: #f0f9ff; font-weight: 600; font-size: 18px;" value="0.0167">
                    </div>
                </div>
            </div>

            <div style="margin-top: 24px;">
                <h3 style="margin-bottom: 16px;">📊 时间换算参考表</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px;">
                    <div style="background: #fafafa; padding: 16px; border-radius: var(--border-radius); font-size: 13px; line-height: 2;">
                        <strong style="color: var(--primary-color); display: block; margin-bottom: 8px;">基础单位</strong>
                        1 分钟 = 60 秒<br>
                        1 小时 = 60 分钟<br>
                        1 天 = 24 小时<br>
                        1 周 = 7 天
                    </div>
                    <div style="background: #fafafa; padding: 16px; border-radius: var(--border-radius); font-size: 13px; line-height: 2;">
                        <strong style="color: var(--primary-color); display: block; margin-bottom: 8px;">较大单位</strong>
                        1 月 ≈ 30 天<br>
                        1 季度 ≈ 91 天<br>
                        1 年 ≈ 365 天<br>
                        1 年 ≈ 12 月
                    </div>
                    <div style="background: #fafafa; padding: 16px; border-radius: var(--border-radius); font-size: 13px; line-height: 2;">
                        <strong style="color: var(--primary-color); display: block; margin-bottom: 8px;">有趣数字</strong>
                        1 百万秒 ≈ 11.57 天<br>
                        1 亿秒 ≈ 3.17 年<br>
                        10 亿秒 ≈ 31.7 年<br>
                        1 世纪 = 100 年
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer class="footer" id="footer"></footer>
    <script src="../js/common.js"></script>
    <script src="../js/i18n.js"></script>
    <script src="../js/tools/time.js"></script>
</body>
</html>
