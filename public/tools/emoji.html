    <style>
        .emoji-container { padding: 20px 0; }

        .search-bar {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 24px;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            font-size: 16px;
            border: 2px solid var(--border-color);
            border-radius: 50px;
            outline: none;
            transition: all 0.3s ease;
            background: white;
            box-sizing: border-box;
        }

        .search-bar input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(64,158,255,0.1);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: var(--text-light);
            pointer-events: none;
        }

        .category-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .category-tabs::-webkit-scrollbar { display: none; }

        .category-tab {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: white;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            transition: all 0.25s ease;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .category-tab:hover { border-color: var(--primary-color); color: var(--primary-color); }
        .category-tab.active {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-color: transparent;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(56px, 1fr));
            gap: 8px;
            width: 100%;
        }

        .emoji-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            background: #fafafa;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            user-select: none;
        }

        .emoji-cell:hover {
            transform: scale(1.15);
            background: white;
            box-shadow: 0 4px 12px rgba(64,158,255,0.15);
            border-color: var(--primary-color);
        }

        .emoji-cell:active { transform: scale(0.95); }

        .copied-toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            opacity: 0;
            padding: 10px 28px;
            background: rgba(0,0,0,0.85);
            color: white;
            border-radius: 30px;
            font-size: 14px;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 9999;
        }

        .copied-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .stats-info {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 16px;
        }

        @media (max-width: 480px) {
            .emoji-grid { grid-template-columns: repeat(auto-fill, minmax(46px, 1fr)); gap: 6px; }
            .emoji-cell { font-size: 26px; border-radius: 8px; }
            .category-tab { padding: 6px 14px; font-size: 13px; }
