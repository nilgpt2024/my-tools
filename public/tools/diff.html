    <style>
        .diff-container { padding: 20px 0; }
        .io-panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 16px;
        }

        @media (max-width: 768px) { .io-panels { grid-template-columns: 1fr; } }

        .panel-box {
            background: #fafafa;
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: white;
            border-bottom: 2px solid var(--border-color);
        }

        .panel-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .clear-btn { padding: 4px 12px; font-size: 12px; cursor: pointer; }

        .panel-box textarea {
            width: 100%;
            min-height: 220px;
            padding: 14px;
            border: none;
            outline: none;
            resize: vertical;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13.5px;
            line-height: 1.7;
            background: #fafafa;
            color: var(--text-primary);
        }

        .action-bar { text-align: center; margin-bottom: 20px; }
        .compare-btn {
            padding: 14px 48px;
            font-size: 17px;
            font-weight: 700;
            border-radius: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(102,126,234,0.35);
            transition: all 0.3s ease;
        }

        .compare-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(102,126,234,0.45); }

        .result-area {
            background: white;
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            overflow: hidden;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            background: linear-gradient(135deg, rgba(64,158,255,0.06), rgba(118,75,162,0.06));
            border-bottom: 1px solid var(--border-color);
        }

        .result-stats { font-size: 13px; color: var(--text-secondary); }
        .stat-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; margin-left: 6px; font-weight: 600; font-size: 12px; }
        .stat-badge.added { background: #e8f5e9; color: #2e7d32; }
        .stat-badge.removed { background: #ffebee; color: #c62828; }
        .stat-badge.same { background: #f5f5f5; color: #616161; }

        .diff-output {
            max-height: 450px;
            overflow-y: auto;
            padding: 4px 0;
        }

        .diff-line {
            display: flex;
            padding: 4px 18px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13.5px;
            line-height: 1.7;
            border-left: 4px solid transparent;
            transition: background 0.15s ease;
        }

        .diff-line:hover { background: rgba(0,0,0,0.02); }
        .diff-line.added { background: rgba(46,125,50,0.08); border-left-color: #4caf50; }
        .diff-line.removed { background: rgba(198,40,40,0.08); border-left-color: #f44336; }
        .diff-line.same { opacity: 0.65; }

        .line-num { width: 36px; text-align: right; padding-right: 12px; color: #999; user-select: none; flex-shrink: 0; font-size: 12px; }
        .line-content { white-space: pre-wrap; word-break: break-all; flex: 1; }
        .line-prefix { width: 16px; font-weight: bold; flex-shrink: 0; }
        .line-prefix.add { color: #4caf50; }
        .line-prefix.remove { color: #f44336; }
        .line-prefix.equal { color: #bbb; }

        .empty-result { padding: 50px; text-align: center; color: var(--text-light); font-style: italic; }

            </div>

            <div class="tool-info-card">
                <div class="info-row">
                    <div class="info-icon">🔄</div>
                    <div class="info-content">
                        <h2 data-i18n="tools.diff.name">文本差异对比工具</h2>
                        <p data-i18n="tools.diff.desc">输入两段文本，快速找出它们之间的差异。支持逐行和逐字对比。</p>
                    </div>
                </div>
            </div>

            <div class="tool-content diff-container">
                <div class="io-panels">
                    <div class="panel-box">
                        <div class="panel-header">
                            <span class="panel-title">📄 <span data-i18n="tools.diff.original">原始文本</span></span>
                            <button class="btn btn-secondary clear-btn" data-target="original" data-i18n="common.clear">清空</button>
                        </div>
                        <textarea id="originalText" data-i18n="tools.diff.original" placeholder="在此粘贴或输入原始文本..."></textarea>
                    </div>
                    <div class="panel-box">
                        <div class="panel-header">
                            <span class="panel-title">📝 <span data-i18n="tools.diff.modified">修改后文本</span></span>

                        </div>
                        <textarea id="modifiedText" data-i18n="tools.diff.modified" placeholder="在此粘贴或输入修改后的文本..."></textarea>
                    </div>
                </div>

                <div class="action-bar">
                    <button class="compare-btn" id="compareBtn" data-i18n="tools.diff.compare">🔍 开始对比</button>

                    </div>
                    <div class="diff-output" id="diffOutput">

                    </div>
                </div>
            </div>
