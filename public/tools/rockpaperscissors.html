        .rps-container {
            display: flex;

        .scoreboard {
            display: flex;
            gap: 32px;
            margin-bottom: 28px;

        .score-value.player { color: var(--primary-color); }
        .score-value.computer { color: #f56c6c; }
        .score-value.draw { color: #909399; }

        .battle-arena {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin-bottom: 36px;
            width: 100%;
            max-width: 560px;
        }

        .fighter {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .fighter-label {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .hand-display {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: white;
            border: 3px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .hand-display.player-hand {
            border-color: var(--primary-color);
            box-shadow: 0 4px 20px rgba(64,158,255,0.2);
        }

        .hand-display.computer-hand {
            border-color: #f56c6c;
            box-shadow: 0 4px 20px rgba(245,108,108,0.2);
        }

        .hand-display.shaking {
            animation: handShake 0.15s ease-in-out infinite;
        }

        @keyframes handShake {
            0%, 100% { transform: translateY(0) rotate(-10deg); }
            50% { transform: translateY(-12px) rotate(10deg); }
        }

        .vs-badge {
            font-size: 24px;
            font-weight: 900;
            color: var(--text-light);
            background: #fafafa;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--border-color);
        }

        .result-banner {
            min-height: 60px;
            margin-bottom: 28px;
            text-align: center;
        }

        .result-text {
            font-size: 26px;
            font-weight: 800;
            opacity: 0;
            transform: scale(0.5) translateY(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-text.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .result-text.win { color: #67c23a; }
        .result-text.lose { color: #f56c6c; }
        .result-text.draw { color: #909399; }

        .choice-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .choice-btn {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            border: 3px solid var(--border-color);
            background: white;
            cursor: pointer;
            font-size: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .choice-btn::after {
            content: attr(data-label);
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .choice-btn:hover:not(:disabled) {
            transform: translateY(-6px) scale(1.08);
            border-color: var(--primary-color);
            box-shadow: 0 8px 24px rgba(64,158,255,0.25);
        }

        .choice-btn:active:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
        }

        .choice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reset-btn-area {
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .battle-arena { gap: 20px; }
