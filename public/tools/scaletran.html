  <main class="tool-layout">
    <div class="container">

        <div class="info-row">
          <div class="info-icon">🔢</div>
          <div class="info-content">
            <h2 data-i18n="tools.scaletran.name">进制转换器</h2>
            <p data-i18n="tools.scaletran.desc">二进制、八进制、十进制、十六进制之间相互转换，支持大整数运算</p>
          </div>
        </div>

      <div class="tool-content">
        <div class="options-group">
          <div class="option-item">
            <label data-i18n="tools.scaletran.inputBase">输入进制：</label>
            <select id="fromBase">
              <option value="2" data-i18n="tools.scaletran.binary">二进制 (Binary)</option>
              <option value="8" data-i18n="tools.scaletran.octal">八进制 (Octal)</option>
              <option value="10" selected data-i18n="tools.scaletran.decimal">十进制 (Decimal)</option>
              <option value="16" data-i18n="tools.scaletran.hexadecimal">十六进制 (Hexadecimal)</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label data-i18n="tools.scaletran.inputValue">输入数值</label>
          <input type="text" class="form-control" id="scaleInput" placeholder="请输入数值..." oninput="convertScale()" style="font-family:'Consolas','Monaco',monospace;">
        </div>

        <div class="action-buttons">
          <button class="btn btn-primary" onclick="convertScale()" data-i18n="tools.scaletran.convert">🔄 转换</button>
          <button class="btn btn-secondary" onclick="clearScale()" data-i18n="common.clear">🗑️ 清空</button>
        </div>

        <div style="margin-top:24px;display:grid;grid-template-columns:1fr 1fr;gap:16px;" id="scaleResults">
          <div class="io-panel">
            <div class="io-panel-header">
              <h3 data-i18n="tools.scaletran.binaryResult">二进制 (Base 2)</h3>
              <button class="btn-secondary" style="padding:6px 12px;font-size:12px;border:1px solid var(--border-color);background:white;border-radius:6px;cursor:pointer;" onclick="copyScaleResult('binary')" data-i18n="common.copy">复制</button>
            </div>
            <div class="io-panel-body">
              <pre id="resultBinary" style="min-height:60px;padding:12px;font-family:'Consolas','Monaco',monospace;font-size:14px;line-height:1.6;word-break:break-all;overflow:auto;">-</pre>
            </div>
          </div>

          <div class="io-panel">
            <div class="io-panel-header">
              <h3 data-i18n="tools.scaletran.octalResult">八进制 (Base 8)</h3>
              <button class="btn-secondary" style="padding:6px 12px;font-size:12px;border:1px solid var(--border-color);background:white;border-radius:6px;cursor:pointer;" onclick="copyScaleResult('octal')" data-i18n="common.copy">复制</button>
