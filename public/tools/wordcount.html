<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="author" content="在线工具集 | Online Tools Hub">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph -->
    <meta property="og:title" content="文本统计 - 在线文本处理工具 | 免费在线工具集">
    <meta property="og:description" content="统计字数、字符数、行数等。免费在线文本统计工具，无需安装即开即用。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tools.suipce.com/tools/wordcount.html">
    <meta property="og:image" content="https://tools.suipce.com/assets/images/logo.png">
    <meta property="og:locale" content="zh_CN">
    <meta property="og:site_name" content="在线工具集 | Online Tools Hub">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="文本统计 - 免费文本处理工具">
    <meta name="twitter:description" content="统计字数、字符数、行数等 - 免费在线使用">
    <meta name="twitter:image" content="https://tools.suipce.com/assets/images/logo.png">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://tools.suipce.com/tools/wordcount.html">
    
    <!-- Hreflang -->
    <link rel="alternate" hreflang="zh-CN" href="https://tools.suipce.com/tools/wordcount.html?lang=zh-CN">
    <link rel="alternate" hreflang="en" href="https://tools.suipce.com/tools/wordcount.html?lang=en">
    <link rel="alternate" hreflang="x-default" href="https://tools.suipce.com/tools/wordcount.html">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/tool.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="container tool-layout">
        <div class="breadcrumb">
            <a href="../index.html" data-i18n="common.breadcrumbHome">首页</a>
            <span>/</span>
            <a href="../index.html#text" data-i18n="categories.text">文本处理</a>
            <span>/</span>
            <span data-i18n="tools.wordcount.name">文本统计</span>
        </div>

        <div class="tool-info-card">
            <div class="info-row">
                <div class="info-icon">📊</div>
                <div class="info-content">
                    <h2 data-i18n="tools.wordcount.name">文本统计工具</h2>
                    <p data-i18n="tools.wordcount.desc">快速统计文本的字数、字符数、行数、段落数、中文字数、英文单词数等信息，支持实时统计和一键复制结果</p>
                </div>
            </div>
        </div>

        <div class="tool-content">
            <div class="io-container">
                <div class="io-panel">
                    <div class="io-panel-header">
                        <h3 data-i18n="tools.wordcount.inputLabel">📝 输入文本</h3>
                        <div class="io-actions">
                            <button onclick="clearInput()" data-i18n="common.clear">清空</button>
                            <button onclick="pasteText()" data-i18n="common.paste">粘贴</button>
                        </div>
                    </div>
                    <div class="io-panel-body">
                        <textarea id="inputText" data-i18n-placeholder="tools.wordcount.inputPlaceholder" placeholder="在此输入或粘贴需要统计的文本内容...&#10;&#10;支持中文、英文、数字、标点符号等多种字符类型的统计"></textarea>
                    </div>
                </div>

                <div class="io-panel">
                    <div class="io-panel-header">
                        <h3>📈 <span data-i18n="tools.wordcount.statistics">统计结果</span></h3>
                        <div class="io-actions">
                            <button onclick="copyResult()" data-i18n="common.copy">复制结果</button>
                            <button onclick="downloadResult()" data-i18n="common.download">导出</button>
                        </div>
                    </div>
                    <div class="io-panel-body" id="resultPanel">
                        <div id="statsGrid" class="stats-grid">
                            <div class="stat-card" data-stat="charCount">
                                <div class="stat-value" id="charCount">0</div>
                                <div class="stat-label" data-i18n="tools.wordcount.characters">总字符数</div>
                            </div>
                            <div class="stat-card" data-stat="charNoSpace">
                                <div class="stat-value" id="charNoSpace">0</div>
                                <div class="stat-label" data-i18n="tools.wordcount.characters">字符数(不含空格)</div>
                            </div>
                            <div class="stat-card" data-stat="wordCount">
                                <div class="stat-value" id="wordCount">0</div>
                                <div class="stat-label" data-i18n="tools.wordcount.words">总字数</div>
                            </div>
                            <div class="stat-card" data-stat="chineseCount">
                                <div class="stat-value" id="chineseCount">0</div>
                                <div class="stat-label" data-i18n="tools.wordcount.chineseChars">中文字数</div>
                            </div>
                            <div class="stat-card" data-stat="englishWordCount">
                                <div class="stat-value" id="englishWordCount">0</div>
                                <div class="stat-label" data-i18n="tools.wordcount.englishWords">英文单词数</div>
                            </div>
                            <div class="stat-card" data-stat="numberCount">
                                <div class="stat-value" id="numberCount">0</div>
                                <div class="stat-label" data-i18n="tools.wordcount.numbers">数字个数</div>
                            </div>
                            <div class="stat-card" data-stat="lineCount">
                                <div class="stat-value" id="lineCount">0</div>
                                <div class="stat-label" data-i18n="tools.wordcount.lines">行数</div>
                            </div>
                            <div class="stat-card" data-stat="paragraphCount">
                                <div class="stat-value" id="paragraphCount">0</div>
                                <div class="stat-label" data-i18n="tools.wordcount.paragraphs">段落数</div>
                            </div>
                            <div class="stat-card" data-stat="punctuationCount">
                                <div class="stat-value" id="punctuationCount">0</div>
                                <div class="stat-label" data-i18n="tools.wordcount.punctuation">标点符号数</div>
                            </div>
                            <div class="stat-card" data-stat="sentenceCount">
                                <div class="stat-value" id="sentenceCount">0</div>
                                <div class="stat-label" data-i18n="tools.wordcount.sentences">句子数</div>
                            </div>
                        </div>

                        <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color);">
                            <h4 style="font-size: 14px; color: var(--text-secondary); margin-bottom: 12px;" data-i18n="tools.wordcount.detailInfo">📋 详细信息</h4>
                            <div id="detailInfo" class="detail-info"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="options-group">
                <div class="option-item">
                    <label><input type="checkbox" id="realtimeCheck" checked> <span data-i18n="tools.wordcount.realtime">实时统计</span></label>
                </div>
                <div class="option-item">
                    <label><input type="checkbox" id="includeSpaceCheck" checked> <span data-i18n="tools.wordcount.includeSpace">空白字符计入统计</span></label>
                </div>
                <div class="option-item">
                    <label data-i18n="tools.wordcount.readingTime">阅读时间预估：</label>
                    <select id="readSpeedSelect">
                        <option value="300" data-i18n="tools.wordcount.slow">慢速 (300字/分)</option>
                        <option value="500" selected data-i18n="tools.wordcount.normal">正常 (500字/分)</option>
                        <option value="800" data-i18n="tools.wordcount.fast">快速 (800字/分)</option>
                    </select>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary" onclick="analyzeText()" data-i18n="common.submit">🔍 分析统计</button>
                <button class="btn btn-secondary" onclick="clearAll()" data-i18n="common.clear">🗑️ 清空全部</button>
            </div>
        </div>
    </main>

    <footer class="footer" id="footer"></footer>

    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/tool.css">
    <script src="../js/common.js"></script>
    <script src="../js/i18n.js"></script>
    <script src="../js/tools/wordcount.js"></script>
</body>
</html>
