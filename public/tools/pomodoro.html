    <style>
        .pomodoro-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        .timer-display {
            position: relative;
            width: 280px;
            height: 280px;
            margin-bottom: 32px;
        }

        #timerCanvas {
            width: 100%;
            height: 100%;
        }

        .timer-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .timer-time {
            font-size: 48px;
            font-weight: 800;
            font-family: 'Consolas', 'Monaco', monospace;
            color: var(--text-primary);
            line-height: 1;
        }

        .timer-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 6px;
            font-weight: 500;
        }

        .mode-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: #fafafa;
            padding: 6px;
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--border-color);
        }

        .mode-tab {
            padding: 10px 24px;
            border-radius: var(--border-radius);
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.25s ease;
        }

        .mode-tab.active {
            background: white;
            color: var(--primary-color);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .mode-tab:hover:not(.active) { color: var(--text-primary); }

        .controls {
            display: flex;
            gap: 14px;
            margin-bottom: 28px;
        }

        .control-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
        }

        .play-btn {
            width: 68px;
            height: 68px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            font-size: 26px;
            box-shadow: 0 4px 16px rgba(231,76,60,0.35);
        }

        .play-btn:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(231,76,60,0.45); }
        .play-btn.running { background: linear-gradient(135deg, #f39c12, #d68910); }
        .play-btn.running:hover { box-shadow: 0 6px 24px rgba(243,156,18,0.45); }

        .secondary-btn {
            background: white;
            border: 2px solid var(--border-color);
            color: var(--text-secondary);
        }

        .secondary-btn:hover { border-color: var(--primary-color); color: var(--primary-color); }

        .stats-row {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .stat-box {
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 800;
            color: var(--primary-color);
        }

        .stat-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .settings-panel {
            width: 100%;
            max-width: 400px;
            background: #fafafa;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            padding: 16px 20px;
        }

        .settings-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
        }

        .setting-row label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .setting-row input[type="number"] {
            width: 64px;
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
            outline: none;
        }

        .setting-row input[type="number"]:focus { border-color: var(--primary-color); }

        @media (max-width: 480px) {
            .timer-display { width: 230px; height: 230px; }
            .timer-time { font-size: 38px; }
            .mode-tab { padding: 8px 16px; font-size: 13px; }
        }
    </style>

<body>
    <nav id="navbar"></nav>

    <main class="tool-layout">
        <div class="container">
            <div class="breadcrumb">
                <a href="../index.html" data-i18n="common.breadcrumbHome">首页</a>
                <span>/</span>
                <span data-i18n="tools.pomodoro.name">番茄钟</span>
            </div>

            <div class="tool-info-card">
                <div class="info-row">
                    <div class="info-icon">🍅</div>
                    <div class="info-content">
                        <h1 data-i18n="tools.pomodoro.name">番茄工作法计时器</h1>
                        <p data-i18n="tools.pomodoro.desc">25分钟专注 + 5分钟休息，高效管理你的时间。支持自定义时长和声音提醒。</p>
                    </div>
                </div>
            </div>

            <div class="tool-content">
                <div class="pomodoro-container">
                    <div class="mode-tabs">
                        <button class="mode-tab active" data-mode="work" data-i18n="tools.pomodoro.work">🍅 专注</button>
                        <button class="mode-tab" data-mode="shortBreak" data-i18n="tools.pomodoro.shortBreak">☕ 短休息</button>
                        <button class="mode-tab" data-mode="longBreak" data-i18n="tools.pomodoro.longBreak">🌴 长休息</button>
                    </div>

                    <div class="timer-display">
                        <canvas id="timerCanvas" width="560" height="560"></canvas>
                        <div class="timer-center">
                            <div class="timer-time" id="timerTime">25:00</div>
                            <div class="timer-label" id="timerLabel">准备开始</div>
                        </div>
                    </div>

                    <div class="controls">
                        <button class="control-btn secondary-btn" id="resetBtn" title="重置">↺</button>
                        <button class="control-btn play-btn" id="playBtn" title="开始/暂停">▶</button>
                        <button class="control-btn secondary-btn" id="skipBtn" title="跳过">⏭</button>
                    </div>

                    <div class="stats-row">
                        <div class="stat-box">
                            <div class="stat-number" id="completedPomodoros">0</div>
                            <div class="stat-desc" data-i18n="tools.pomodoro.completedSessions">已完成番茄</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number" id="totalMinutes">0</div>
                            <div class="stat-desc" data-i18n="tools.pomodoro.totalTime">累计专注(分)</div>
                        </div>
                    </div>

                    <div class="settings-panel">
                        <div class="settings-title">⚙️ <span data-i18n="tools.pomodoro.settings">时间设置（分钟）</span></div>
                        <div class="setting-row">
                            <label data-i18n="tools.pomodoro.workDuration">专注时长</label>
                            <input type="number" id="workDuration" value="25" min="1" max="120">
                        </div>
                        <div class="setting-row">
                            <label data-i18n="tools.pomodoro.shortBreakDuration">短休息</label>
                            <input type="number" id="shortBreakDuration" value="5" min="1" max="30">
                        </div>
                        <div class="setting-row">
                            <label data-i18n="tools.pomodoro.longBreakDuration">长休息</label>
                            <input type="number" id="longBreakDuration" value="15" min="1" max="60">
                        </div>
                    </div>
                </div>
            </div>
        </div>
