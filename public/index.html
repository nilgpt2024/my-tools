    <!-- 首页专用脚本 -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            renderCategories();
            renderPopularTools();
            renderRecentTools();
            initSearch();
        });

        function getToolId(url) {
            return url.replace('tools/', '').replace('.html', '');
        }

        function getCategoryId(categoryName) {
            const cat = ToolsConfig.categories.find(c => c.title === categoryName);
            return cat ? cat.id : '';
        }

        function renderCategories() {
            const grid = document.getElementById('categoriesGrid');
            if (!grid) return;

            grid.innerHTML = ToolsConfig.categories.map(category => `
                <div class="category-card-wrapper" id="${category.id}">
                    <div style="text-align: center; margin-bottom: 24px;">
                        <span style="font-size: 48px;">${category.icon}</span>
                        <h2 style="font-size: 24px; margin-top: 12px; color: var(--text-primary);">${I18N.t(`categories.${category.id}`) || category.title}</h2>
                        <p style="color: var(--text-secondary); font-size: 14px; margin-top: 8px;">${category.tools.length} ${I18N.currentLang === 'en' ? 'tools' : '个工具'}</p>
                    </div>
                    
                    <div style="display: grid; gap: 12px;">
                        ${category.tools.map(tool => `
                            <a href="${tool.url}" class="category-card" style="padding: 16px 20px; display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit;">
                                <img src="assets/images/logo/${getToolIconName(tool.url)}" alt="${tool.name}" 
                                     style="width: 36px; height: 36px; object-fit: contain;"
                                     onerror="this.outerHTML='<span style=\\'width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:20px;background:linear-gradient(135deg,rgba(64,158,255,0.1),rgba(118,75,162,0.1));border-radius:8px\\'>${tool.icon}</span>'">
                                <div style="flex: 1;">
                                    <h4 style="font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px;">${I18N.t('tools.' + getToolId(tool.url) + '.name') || tool.name}</h4>
                                    <p style="font-size: 13px; color: var(--text-light); line-height: 1.4;">${I18N.t('tools.' + getToolId(tool.url) + '.desc') || tool.desc}</p>
                                </div>
                                <span style="color: var(--primary-color); font-size: 20px;">→</span>
                            </a>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function getToolIconName(url) {
            const toolMap = {
                'tools/randompassword.html': 'keywords.png',
                'tools/urlencode.html': 'url.png',
                'tools/uuid.html': 'uuid.png',
                'tools/timetran.html': 'Time.png',
                'tools/md5.html': 'md5.png',
                'tools/json.html': 'json.png',
                'tools/reg.html': 'reg.png',
                'tools/unicode.html': 'union.png',
                'tools/httpstatuscode.html': 'http_code.png',
                'tools/jwt.html': 'jwt_parse.png',
                'tools/htmlentity.html': 'HtmlEntity.png',
                'tools/jsformat.html': 'JSForamt.png',
                'tools/htmlformat.html': 'HtmlFormat.png',
                'tools/cssformat.html': 'CssFormat.png',
                'tools/base64.html': 'Base64.svg',
                'tools/scaletran.html': 'scaletran.png',
                'tools/hashcalculator.html': 'hashcalculator.svg',
                'tools/sqlformat.html': 'sqlformat.svg',
                'tools/xmlformat.html': 'xmlformat.svg',
                'tools/wordcount.html': 'wordCount.png',
                'tools/wordfrequency.html': 'wordfrequency.svg',
                'tools/textremoveduplicate.html': 'textRemoveDuplicate.png',
                'tools/textreplace.html': 'textreplace.svg',
                'tools/markdown.html': 'file-markdown-fill.png',
                'tools/asciiwordpic.html': 'ascii_word_pic.png',
                'tools/numbertochinese.html': 'numberToChinese.png',
                'tools/morse.html': 'dm.png',
                'tools/imgcut.html': 'imgCut.png',
                'tools/imagewatermark.html': 'imagewatermark.svg',
                'tools/colorpicker.html': 'color_picker.png',
                'tools/imagecolorpicker.html': 'imagecolorpicker.svg',
                'tools/qrcode.html': 'qrcode.png',
                'tools/length.html': 'length.png',
                'tools/area.html': 'area.png',
                'tools/weight.html': 'weight.png',
                'tools/temperature.html': 'temperature.png',
                'tools/time.html': 'time_unit.png',
                'tools/pressure.html': 'pressure.png',
                'tools/power.html': 'power.png',
                'tools/storageconverter.html': 'storageconverter.svg',
                'tools/heat.html': 'heat.png',
                'tools/bar.html': 'bar.png',
                'tools/line.html': 'line.png',
                'tools/pie.html': 'pie.png',
                'tools/scatter.html': 'scatter.png',
                'tools/wordcloud.html': 'wordcloud.svg',
                'tools/coin.html': 'coin.png',
                'tools/dice.html': 'dice.png',
                'tools/random.html': 'choose.png',
                'tools/lottery.html': 'lottery.svg',
                'tools/rockpaperscissors.html': 'rockpaperscissors.svg',
                'tools/reactiontest.html': 'reactiontest.svg',
                'tools/pomodoro.html': 'pomodoro.svg',
                'tools/barrage.html': 'medium.png',
                'tools/wheel.html': 'wheel.svg',
                'tools/emoji.html': 'emoji.svg',
                'tools/diff.html': 'diff.png',
                'tools/calculator.html': 'calculator.svg',
                'tools/colorpalette.html': 'palettes.png',
                'tools/ip.html': 'IP.png',
                'tools/webinfo.html': 'webInfo.png'
            };
            return toolMap[url] || 'json.png';
        }

        function renderPopularTools() {
            const scroll = document.getElementById('popularToolsScroll');
            if (!scroll) return;

            const popularTools = [
                ToolsConfig.categories[0].tools[0],
                ToolsConfig.categories[0].tools[4],
                ToolsConfig.categories[0].tools[5],
                ToolsConfig.categories[0].tools[14],
                ToolsConfig.categories[0].tools[3],
                ToolsConfig.categories[4].tools[4],
                ToolsConfig.categories[2].tools[4],
                ToolsConfig.categories[5].tools[0]
            ];

            scroll.innerHTML = popularTools.map(tool => `
                <a href="${tool.url}" class="tool-mini-card">
                    <img src="assets/images/logo/${getToolIconName(tool.url)}" alt="${I18N.t('tools.' + getToolId(tool.url) + '.name') || tool.name}"
                         onerror="this.style.display='none'">
                    <h4>${I18N.t('tools.' + getToolId(tool.url) + '.name') || tool.name}</h4>
                    <p>${I18N.t('tools.' + getToolId(tool.url) + '.desc') || tool.desc}</p>
                </a>
            `).join('');
        }

        function renderRecentTools() {
            const grid = document.getElementById('recentToolsGrid');
            if (!grid) return;

            const recentTools = [
                ...ToolsConfig.categories[0].tools.slice(0, 4),
                ...ToolsConfig.categories[1].tools.slice(0, 2),
                ...ToolsConfig.categories[2].tools.slice(0, 2),
                ...ToolsConfig.categories[3].tools.slice(0, 2)
            ];

            grid.innerHTML = recentTools.map(tool => `
                <a href="${tool.url}" class="quick-tool-card">
                    <span class="quick-tool-icon">${tool.icon}</span>
                    <div class="quick-tool-info">
                        <strong>${I18N.t('tools.' + getToolId(tool.url) + '.name') || tool.name}</strong>
                        <span>${I18N.t('tools.' + getToolId(tool.url) + '.desc') || tool.desc}</span>
                    </div>
                    <span class="quick-tool-arrow">→</span>
                </a>
            `).join('');
        }

        function initSearch() {
            const searchInput = document.getElementById('searchInput');
            if (!searchInput) return;

            let debounceTimer;
            searchInput.addEventListener('input', function() {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    performSearch();
                }, 300);
            });

            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });
        }

        function performSearch() {
            const searchInput = document.getElementById('searchInput');
            const resultsDiv = document.getElementById('searchResults');
            
            if (!searchInput || !resultsDiv) return;

            const keyword = searchInput.value.trim();
            
            if (!keyword) {
                resultsDiv.style.display = 'none';
                return;
            }

            const results = ToolsConfig.searchTools(keyword);
            
            if (results.length === 0) {
                resultsDiv.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: var(--text-light);">
                        <p style="font-size: 48px; margin-bottom: 16px;">😕</p>
                        <p style="font-size: 16px;">${I18N.t('noResults')} "${Utils.escapeHtml(keyword)}"</p>
                        <p style="font-size: 14px; margin-top: 8px;">${I18N.t('tryOtherKeywords')}</p>
                    </div>
                `;
                resultsDiv.style.display = 'block';
                return;
            }

            resultsDiv.innerHTML = `
                <div style="background: white; border-radius: 12px; padding: 20px; box-shadow: var(--shadow);">
                    <h3 style="margin-bottom: 16px; color: var(--text-primary); font-size: 16px;">
                        ${I18N.t('foundTools', { count: results.length })}
                    </h3>
                    <div style="display: grid; gap: 8px;">
                        ${results.map(tool => `
                            <a href="${tool.url}" style="
                                display: flex; align-items: center; gap: 12px;
                                padding: 12px 16px; background: #f8f9fa;
                                border-radius: 8px; text-decoration: none;
                                color: var(--text-primary);
                                transition: all 0.2s;
                            " 
                            onmouseover="this.style.background='#e8f4ff'; this.style.transform='translateX(4px)'"
                            onmouseout="this.style.background='#f8f9fa'; this.style.transform='translateX(0)'">
                                <img src="assets/images/logo/${getToolIconName(tool.url)}" alt="${I18N.t('tools.' + getToolId(tool.url) + '.name') || tool.name}"
                                     style="width: 32px; height: 32px; object-fit: contain;"
                                     onerror="this.style.display='none'">
                                <div style="flex: 1;">
                                    <strong style="font-size: 14px;">${I18N.t('tools.' + getToolId(tool.url) + '.name') || tool.name}</strong>
                                    <span style="font-size: 12px; color: var(--text-light); margin-left: 8px; background: #e4e7ed; padding: 2px 8px; border-radius: 4px;">${I18N.t('categories.' + getCategoryId(tool.category)) || tool.category}</span>
                                    <p style="font-size: 13px; color: var(--text-secondary); margin-top: 2px;">${I18N.t('tools.' + getToolId(tool.url) + '.desc') || tool.desc}</p>
                                </div>
                                <span style="color: var(--primary-color); font-size: 18px;">→</span>
                            </a>
                        `).join('')}
                    </div>
                </div>
            `;
            resultsDiv.style.display = 'block';
        }
    </script>
</body>
